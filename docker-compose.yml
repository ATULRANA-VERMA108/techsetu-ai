version: '3.8'

services:
  # 1. PostgreSQL Database for transactional records (Users, Roadmaps, Quizzes)
  postgres:
    image: postgres:16-alpine
    container_name: techsetu_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: techsetu_db
      POSTGRES_USER: techsetu_admin
      POSTGRES_PASSWORD: techsetu_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. MongoDB for semi-structured records (AI interview logs, chats, notifications)
  mongodb:
    image: mongo:7.0
    container_name: techsetu_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # 3. Redis for caching, sessions, and real-time state
  redis:
    image: redis:7.2-alpine
    container_name: techsetu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 4. TechSetu AI Spring Boot Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techsetu_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/techsetu_db
      - SPRING_DATASOURCE_USERNAME=techsetu_admin
      - SPRING_DATASOURCE_PASSWORD=techsetu_secure_pass
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/techsetu_db
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - postgres
      - mongodb
      - redis

  # 5. Nginx Reverse Proxy & API Gateway
  nginx:
    image: nginx:1.25-alpine
    container_name: techsetu_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
